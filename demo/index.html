<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luxe Media Card Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #0f131a;
        color: #fff;
      }
      body {
        margin: 0;
        padding: 32px;
        background: radial-gradient(circle at top, #1b2533, #0f131a 55%);
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        display: grid;
        gap: 20px;
      }
      section {
        display: grid;
        gap: 12px;
      }
      h1, h2, p { margin: 0; }
      .frame {
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,.35);
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Luxe Media Card demo</h1>
        <p>Local preview states for quick visual checks while developing.</p>
      </section>
      <section id="demo-root"></section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
